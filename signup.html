<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="signup.html">Sign Up</a></li>
                <li><a href="login.html">Login</a></li>
             </ul>
        </nav>
    </header>
    <main class="auth-page">
        <h1>Sign Up Page</h1>
        <form class="auth-form" action="/signup" method="post">
            <label for="username">Username:</label>
            <input class="form-input" type="text" id="username" name="username" required>

            <label for="email">Email:</label>
            <input class="form-input" type="email" id="email" name="email" required>

            <label for="password">Password:</label>
            <input class="form-input" type="password" id="password" name="password" required>
            <p>Experience Level:</p>
            <input type="radio" id="beginner" name="experience" value="Beginner">
            <label for="beginner">Beginner</label>
            <input type="radio" id="intermediate" name="experience" value="Intermediate">
            <label for="intermediate">Intermediate</label>
            <input type="radio" id="advanced" name="experience" value="Advanced">
            <label for="advanced">Advanced</label><br><br>
            <label for="terms">I agree to the Terms and Conditions:</label>
            <input type="checkbox" id="terms" name="terms" required><br><br>
            <button type="submit">Sign Up</button>
        </form>
    </main>
    <footer>
        <p>© 2026 Futures Market Pulse</p>     
    </footer>
</body>
</html>
